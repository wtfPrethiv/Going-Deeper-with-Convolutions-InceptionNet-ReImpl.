model:
  num_classes: 10
  aux_logits: true
  dropout: 0.4

training:
  epochs: 35
  batch_size: 64
  lr: 0.01
  momentum: 0.9
  weight_decay: 1.0e-4
  aux_loss_weight: 0.3
  lr_step_size: 8
  lr_gamma: 0.96
  num_workers: 4

data:
  root: data/dataset
  mean: [0.4914, 0.4822, 0.4465]
  std:  [0.2023, 0.1994, 0.2010]
  random_crop_size: 32
  random_crop_padding: 4
  color_jitter: 0.2        
  
paths:
  checkpoints: models/
  best_model:  models/best.pth
  logs:        logs/
